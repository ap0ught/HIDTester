name: Build macOS Release

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Download ImGui
      run: |
        mkdir -p thirdparty
        git clone --depth 1 https://github.com/ocornut/imgui.git thirdparty/imgui

    - name: Install Dependencies
      run: |
        brew update
        brew install sdl3 cmake

    - name: Configure CMake
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
          -DCMAKE_OSX_ARCHITECTURES=arm64 \
          -DCMAKE_PREFIX_PATH="/opt/homebrew"

    - name: Build Application
      run: cmake --build build --config Release -j 4

    # Manual bundling of SDL3
    - name: Bundle Dynamic Libraries manually
      run: |
        # 1. Create the libs directory
        mkdir -p build/libs
        
        # 2. Copy the actual SDL3 library from Homebrew into our libs directory
        SDL3_PREFIX="$(brew --prefix sdl3)"
        SDL3_DYLIB="$(find "${SDL3_PREFIX}/lib" -maxdepth 1 -name 'libSDL3*.dylib' | head -n 1)"
        SDL3_LINK_NAME="$(otool -L build/HIDTester | awk '/libSDL3/ { print $1; exit }')"
        test -n "$SDL3_DYLIB" || { echo "SDL3 dylib not found under ${SDL3_PREFIX}/lib"; exit 1; }
        test -n "$SDL3_LINK_NAME" || { echo "SDL3 link reference not found in build/HIDTester"; otool -L build/HIDTester; exit 1; }
        cp "$SDL3_DYLIB" build/libs/
        
        # 3. Reroute the internal library path so the app looks for SDL3 locally (@executable_path)
        # instead of searching in the global Homebrew directory
        install_name_tool -change "$SDL3_LINK_NAME" "@executable_path/libs/$(basename "$SDL3_DYLIB")" build/HIDTester
        
        # Fallback: Add the local libs folder to the general Run-time search path
        install_name_tool -add_rpath @executable_path/libs build/HIDTester || true

    - name: Package Release
      run: |
        VERSION="${{ github.ref_name }}"
        DIR_NAME="HIDTester-$VERSION-macOS"
        mkdir -p "$DIR_NAME"
        
        cp build/HIDTester "$DIR_NAME/"
        
        # Copy the libs folder. 
        # Using -R to ensure any potential symlinks are handled correctly.
        cp -R build/libs "$DIR_NAME/" 
        
        cp README.md "$DIR_NAME/" || true
        cp MIGRATION.md "$DIR_NAME/" || true
        cp LICENSE "$DIR_NAME/" || true

        zip -r "$DIR_NAME.zip" "$DIR_NAME/"

    - name: Upload Artifact to Actions
      uses: actions/upload-artifact@v4
      with:
        name: HIDTester-${{ github.ref_name }}-macOS
        path: HIDTester-${{ github.ref_name }}-macOS/

    - name: Upload to GitHub Release
      if: github.event_name == 'release'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release upload ${{ github.ref_name }} "HIDTester-${{ github.ref_name }}-macOS.zip"
