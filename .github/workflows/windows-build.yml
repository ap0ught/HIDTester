name: Build Windows Release

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Download ImGui
      run: |
        mkdir thirdparty
        git clone --depth 1 https://github.com/ocornut/imgui.git thirdparty/imgui

    - name: Download and Extract SDL3
      # Download official SDL3 VC development libraries and extract to thirdparty/SDL3
      run: |
        $SDLVersion = "3.4.8"
        Invoke-WebRequest -Uri "https://github.com/libsdl-org/SDL/releases/download/release-$SDLVersion/SDL3-devel-$SDLVersion-VC.zip" -OutFile "SDL3.zip"
        Expand-Archive -Path "SDL3.zip" -DestinationPath "thirdparty"
        Rename-Item -Path "thirdparty\SDL3-$SDLVersion" -NewName "SDL3"

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build Application
      run: cmake --build build --config Release -j 4

    - name: Package Release
      # Using bash shell here to keep the zip/cp syntax consistent with your Linux/macOS workflows
      shell: bash 
      run: |
        VERSION="${{ github.ref_name }}"
        DIR_NAME="HIDTester-$VERSION-Windows"
        mkdir -p "$DIR_NAME"
        
        # Copy the executable and the SDL3.dll to the distribution folder
        cp build/Release/HIDTester.exe "$DIR_NAME/"
        cp build/Release/SDL3.dll "$DIR_NAME/" || true
        cp README.md "$DIR_NAME/" || true
        cp MIGRATION.md "$DIR_NAME/" || true
        cp LICENSE "$DIR_NAME/" || true
        
        # Windows runners use 7z to create zip archives
        7z a "$DIR_NAME.zip" "$DIR_NAME/"

    - name: Upload Artifact to Actions
      uses: actions/upload-artifact@v4
      with:
        name: HIDTester-${{ github.ref_name }}-Windows
        path: HIDTester-${{ github.ref_name }}-Windows/

    - name: Upload to GitHub Release
      if: github.event_name == 'release'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release upload ${{ github.ref_name }} "HIDTester-${{ github.ref_name }}-Windows.zip"
